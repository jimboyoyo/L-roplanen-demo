<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LäroPlanen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Century Gothic', CenturyGothic, sans-serif;
    background: #0a0a1a;
    color: #fff;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 10px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.8);
  }

  .hint {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
  }

  .shell {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* MAP AREA */
  .map-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: grab;
  }
  .map-area:active { cursor: grabbing; }

  .map-canvas {
    position: absolute;
    transform-origin: 0 0;
    will-change: transform;
  }

  .map-canvas svg {
    display: block;
  }

  /* Make all <a> tags in the SVG interceptable */
  .map-canvas svg a {
    cursor: pointer;
  }

  /* Hover highlight effect on clickable groups */
  .map-canvas svg a:hover rect,
  .map-canvas svg a:hover circle {
    opacity: 0.85;
  }

  /* Zoom controls */
  .zoom-controls {
    position: absolute;
    bottom: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .zoom-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.8);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.15s;
  }
  .zoom-btn:hover { background: rgba(255,255,255,0.18); }

  /* SIDE PANEL */
  .panel {
    width: 360px;
    min-width: 360px;
    background: #111827;
    border-left: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    transition: min-width 0.25s ease, width 0.25s ease;
    overflow: hidden;
  }

  .panel.closed {
    width: 0;
    min-width: 0;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.05em;
  }

  .panel-subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 3px;
  }

  .close-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 20px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
    margin-left: 12px;
  }
  .close-btn:hover { color: rgba(255,255,255,0.8); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  /* Content sections */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 20px;
  }
  .section-label:first-child { margin-top: 0; }

  .intro-text {
    font-size: 13px;
    line-height: 1.7;
    color: rgba(255,255,255,0.75);
    margin-bottom: 4px;
  }

  .step-list {
    list-style: none;
    padding: 0;
  }

  .step-list li {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    padding: 6px 0 6px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    position: relative;
    line-height: 1.5;
  }

  .step-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 13px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }

  .step-list li:last-child { border-bottom: none; }

  .phase-header {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    padding: 10px 0 4px;
  }

  /* Resource / link buttons */
  .resource-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
  }

  .resource-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
  }

  .resource-icon {
    font-size: 16px;
    flex-shrink: 0;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: rgba(255,255,255,0.2);
    font-size: 13px;
    line-height: 1.6;
    padding: 40px;
  }

  .empty-icon {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  /* Modal document viewer */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    width: 82vw;
    height: 88vh;
    background: #1a1a2e;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .modal-header {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 12px;
  }

  .modal-title {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.05em;
  }

  .modal-actions { display: flex; gap: 8px; align-items: center; }

  .modal-open-btn {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 5px;
    padding: 4px 10px;
    cursor: pointer;
    text-decoration: none;
    font-family: inherit;
  }
  .modal-open-btn:hover { color: #fff; background: rgba(255,255,255,0.12); }

  .modal-close {
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
  }
  .modal-close:hover { color: #fff; }

  .modal iframe {
    flex: 1;
    border: none;
    width: 100%;
    background: #fff;
  }
</style>
</head>

<script>
// ─── NODE CONTENT DATA ───────────────────────────────────────────────
// Each key matches the data-name attribute of a group in your SVG.
// Add entries here as you build out the full map.
// "link" is the OneDrive folder/file URL for that node.

// ─── NODE MAP ─────────────────────────────────────────────────────────
// Maps SVG data-name → JSON filename in content/ folder.
// Add a line here for each node as you create its JSON file.

const nodeMap = {
  "Djuret": "djuret.json"
  // "Frukten": "frukten.json",
  // "Finn Fem Fel": "finn-fem-fel.json",
  // add more as you convert them...
};

// ─── PANEL LOGIC ──────────────────────────────────────────────────────

async function openPanel(name) {
  document.getElementById('panelTitle').textContent = name;
  document.getElementById('panelSubtitle').textContent = '';
  document.getElementById('panelBody').innerHTML =
    `<div class="empty-state"><div class="empty-icon">⋯</div>Laddar...</div>`;
  document.getElementById('panel').classList.remove('closed');

  const file = nodeMap[name];
  if (!file) {
    document.getElementById('panelBody').innerHTML =
      `<div class="empty-state"><div class="empty-icon">◎</div>Ingen uppgift inlagd ännu för den här noden.</div>`;
    return;
  }

  try {
    const res = await fetch('content/' + file);
    const data = await res.json();
    renderPanel(data);
  } catch(e) {
    document.getElementById('panelBody').innerHTML =
      `<div class="empty-state"><div class="empty-icon">!</div>Kunde inte ladda innehållet.</div>`;
  }
}

function youtubeEmbed(url) {
  const match = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return match ? `https://www.youtube.com/embed/${match[1]}` : null;
}

function renderPanel(d) {
  document.getElementById('panelTitle').textContent = d.title;
  document.getElementById('panelSubtitle').textContent =
    [d.type, d.duration].filter(Boolean).join(' · ');

  let html = '';

  if (d.video) {
    const embedUrl = youtubeEmbed(d.video);
    if (embedUrl) {
      html += `<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;margin-bottom:16px;">
                 <iframe src="${embedUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:8px;"
                   allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                   allowfullscreen></iframe>
               </div>`;
    }
  }

  if (d.scenario) {
    html += `<div class="section-label">Scenario</div>
             <p class="intro-text">${d.scenario}</p>`;
  }

  if (d.steps) {
    html += `<div class="section-label">Steg för steg</div>`;
    for (const [phase, steps] of Object.entries(d.steps)) {
      html += `<div class="phase-header">${phase}</div><ul class="step-list">`;
      steps.forEach(s => { html += `<li>${s}</li>`; });
      html += `</ul>`;
    }
  }

  if (d.bonus) {
    html += `<div class="phase-header">Bonus</div>
             <ul class="step-list"><li>`;
    if (d.bonusUrl) {
      html += `<a href="${d.bonusUrl}" target="_blank" style="color:rgba(255,255,255,0.6);">${d.bonus}</a>`;
    } else {
      html += d.bonus;
    }
    html += `</li></ul>`;
  }

  if (d.deliverables?.length) {
    html += `<div class="section-label">Ska lämnas in</div><ul class="step-list">`;
    d.deliverables.forEach(item => { html += `<li>${item}</li>`; });
    html += `</ul>`;
  }

  if (d.resources?.length) {
    html += `<div class="section-label">Resurser</div>`;
    d.resources.forEach(r => {
      html += `<a class="resource-btn" href="${r.url}" target="_blank">
                 <span class="resource-icon">🔗</span>${r.label}
               </a>`;
    });
  }

  if (d.roles?.length) {
    html += `<div style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.07);
                         font-size:11px;color:rgba(255,255,255,0.25);">
               Roller: ${d.roles.join(', ')}
             </div>`;
  }

  document.getElementById('panelBody').innerHTML = html;
}

function closePanel() {
  document.getElementById('panel').classList.add('closed');
}

// Modal removed — content now renders directly in the panel.
// The modal overlay HTML can stay in place for future use.

// ─── INTERCEPT SVG LINK CLICKS ───────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  const svg = document.querySelector('#mapCanvas svg');
  if (!svg) return;

  svg.querySelectorAll('a').forEach(anchor => {
    anchor.addEventListener('click', e => {
      e.preventDefault();
      // Find the closest named group
      const group = anchor.querySelector('g[data-name]') || anchor.closest('g[data-name]');
      const name = group ? group.getAttribute('data-name') : null;
      const link = anchor.getAttribute('xlink:href') || anchor.getAttribute('href') || '';

      // Skip structural layers
      const skip = ['LäorPlan', 'Lager 2'];
      if (name && !skip.includes(name)) {
        openPanel(name);
      }
    });
  });
});

// ─── PAN + ZOOM ───────────────────────────────────────────────────────

let scale = 1, tx = 50, ty = 30;

function applyTransform() {
  document.getElementById('mapCanvas').style.transform =
    `translate(${tx}px, ${ty}px) scale(${scale})`;
}

function zoom(factor) {
  const area = document.getElementById('mapArea');
  const cx = area.clientWidth / 2;
  const cy = area.clientHeight / 2;
  tx = cx - (cx - tx) * factor;
  ty = cy - (cy - ty) * factor;
  scale = Math.min(4, Math.max(0.2, scale * factor));
  applyTransform();
}

function resetView() {
  scale = 1; tx = 50; ty = 30;
  applyTransform();
}

applyTransform();

const area = document.getElementById('mapArea');
let dragging = false, sx, sy, stx, sty;

area.addEventListener('mousedown', e => {
  if (e.target.closest('a') || e.target.closest('.zoom-btn')) return;
  dragging = true;
  sx = e.clientX; sy = e.clientY; stx = tx; sty = ty;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = stx + (e.clientX - sx);
  ty = sty + (e.clientY - sy);
  applyTransform();
});
window.addEventListener('mouseup', () => dragging = false);

area.addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.1 : 0.9);
}, { passive: false });
</script>
